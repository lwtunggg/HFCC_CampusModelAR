<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>HFCC Campus AR</title>

    <!-- 1. A-Frame First -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <!-- 2. MindAR Second -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <!-- 3. A-Frame Extras (Specific version to stop the Three.js conflict) -->
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      
      /* CRITICAL FIX: Make sure the body/html are transparent so camera shows through */
      html, body { 
        width: 100%; 
        height: 100%; 
        overflow: hidden; 
        background: transparent !important; 
      }

      /* ── Splash ── */
      #splash {
        position: fixed; inset: 0; z-index: 999;
        background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0d1b2a 100%);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 24px;
        color: #fff; font-family: 'Segoe UI', sans-serif;
        transition: opacity 0.6s ease;
      }
      #splash.hidden { opacity: 0; pointer-events: none; }

      .logo-ring {
        width: 110px; height: 110px; border-radius: 50%;
        border: 3px solid rgba(100,180,255,0.3);
        border-top-color: #64b4ff;
        animation: spin 1.4s linear infinite;
        display: flex; align-items: center; justify-content: center;
      }
      .logo-ring::after { content: '🏫'; font-size: 44px; animation: spin 1.4s linear infinite reverse; }
      @keyframes spin { to { transform: rotate(360deg); } }

      .splash-title {
        font-size: clamp(20px, 5vw, 28px); font-weight: 700;
        letter-spacing: 2px; text-align: center;
        background: linear-gradient(90deg, #64b4ff, #a78bfa, #64b4ff);
        background-size: 200%;
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        animation: shimmer 2.5s linear infinite;
      }
      @keyframes shimmer { to { background-position: 200% center; } }

      .start-btn {
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        border: none; color: #fff; padding: 14px 40px;
        border-radius: 50px; font-size: 16px; font-weight: 700;
        cursor: pointer; letter-spacing: 1px;
        box-shadow: 0 0 30px rgba(99,102,241,0.5);
      }

      /* ── HUD & HINTS ── */
      #hud {
        position: fixed; top: 0; left: 0; right: 0; z-index: 10;
        pointer-events: none; padding: 16px 20px;
        display: none; justify-content: space-between; align-items: flex-start;
      }
      #hud.visible { display: flex; }
      .hud-badge {
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(10px);
        border-radius: 12px; padding: 8px 14px; color: #fff; font-family: sans-serif;
      }
      #status-dot { width: 8px; height: 8px; border-radius: 50%; background: #f59e0b; display: inline-block; margin-right: 6px; }
      #status-dot.found { background: #10b981; }

      #scan-hint {
        position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
        z-index: 10; background: rgba(0,0,0,0.7); color: white;
        padding: 10px 20px; border-radius: 50px; display: none;
      }
      #scan-hint.visible { display: block; }

      /* CRITICAL FIX: Ensure MindAR video is visible */
      .mindar-ui-overlay { display: none !important; }
      video {
        position: absolute;
        top: 0; left: 0;
        z-index: -2 !important; /* Forces video behind the AR objects */
      }
    </style>
  </head>
  <body>

    <div id="splash">
      <div class="logo-ring"></div>
      <div class="splash-title">HFCC CAMPUS AR</div>
      <button class="start-btn" id="startBtn">Launch AR</button>
    </div>

    <div id="hud">
      <div class="hud-badge"><strong>HFCC Campus</strong></div>
      <div class="hud-badge"><span id="status-dot"></span><span id="status-text">Searching…</span></div>
    </div>

    <div id="scan-hint">📷 Point at Campus Model</div>

    <!-- 2. The Scene -->
    <!-- Note: imageTargetSrc uses a leading / to work with Vite public folder -->
    <a-scene
    mindar-image="imageTargetSrc: /targets/campus.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;"
    color-space="sRGB"
    embedded
    renderer="colorManagement: true, physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <!-- Ensure this path is 100% correct in your public folder -->
      <a-asset-item id="catModel" src="/models/oiiaioooooiai_cat.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <!-- We use 'gltf-model' directly and simplified animation-mixer -->
      <a-entity 
        gltf-model="#catModel" 
        position="0 0 0" 
        scale="0.1 0.1 0.1" 
        animation-mixer>
      </a-entity>
    </a-entity>
  </a-scene>

    <script>
      const splash = document.getElementById('splash');
      const startBtn = document.getElementById('startBtn');
      const hud = document.getElementById('hud');
      const scanHint = document.getElementById('scan-hint');

      startBtn.addEventListener('click', () => {
        splash.classList.add('hidden');
        hud.classList.add('visible');
        scanHint.classList.add('visible');

        // Start MindAR
        const sceneEl = document.querySelector('a-scene');
        const arSystem = sceneEl.systems['mindar-image-system'];
        arSystem.start(); 
      });

      const target = document.querySelector('[mindar-image-target]');
      target.addEventListener('targetFound', () => {
        document.getElementById('status-dot').classList.add('found');
        document.getElementById('status-text').textContent = 'Detected!';
        scanHint.classList.remove('visible');
      });

      target.addEventListener('targetLost', () => {
        document.getElementById('status-dot').classList.remove('found');
        document.getElementById('status-text').textContent = 'Searching…';
        scanHint.classList.add('visible');
      });
    </script>
  </body>
</html>
