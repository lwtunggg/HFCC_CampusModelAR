<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>HFCC Campus AR</title>

    <!-- 1. A-Frame First -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <!-- 2. MindAR Second -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <!-- 3. A-Frame Extras (Specific version to stop the Three.js conflict) -->
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>

    <style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  html, body { 
    width: 100%; 
    height: 100%; 
    overflow: hidden; 
    background: transparent !important; 
    font-family: 'Segoe UI', Roboto, sans-serif;
  }

  /* ── Splash Screen ── */
  #splash {
    position: fixed; inset: 0; z-index: 999;
    background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 50%, #eceff1 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 30px;
    transition: opacity 0.8s ease;
  }
  #splash.hidden { opacity: 0; pointer-events: none; }

  /* ── Logo Ring & Centered Emoji ── */
  .logo-ring {
    width: 120px; height: 120px; border-radius: 50%;
    border: 5px solid #f48fb1;
    border-top-color: #90a4ae; /* Grey accent */
    animation: spin 2s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
    display: flex; 
    align-items: center;      /* Vertically centers emoji */
    justify-content: center;   /* Horizontally centers emoji */
    background: white;
    box-shadow: 0 10px 25px rgba(244, 143, 177, 0.3);
    position: relative;
  }

  /* The Emoji */
  .logo-ring::after { 
    content: '🩶'; 
    font-size: 55px; 
    line-height: 1; /* Prevents vertical offset */
    display: block;
    /* This counter-rotates the emoji so it stays upright while the ring spins */
    animation: unspin 2s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
  }

  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes unspin { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }

  .splash-title {
    font-size: 26px; font-weight: 800;
    letter-spacing: 3px; text-align: center;
    color: #880e4f;
  }

  /* ── Dark Grey Launch Button ── */
  .start-btn {
    background: #37474f; /* Deep Slate Grey */
    border: 2px solid #f8bbd0; /* Pink border accent */
    color: #fce4ec; /* Light pink text */
    padding: 18px 50px;
    border-radius: 12px; /* Slightly more modern square-ish edges */
    font-size: 16px; font-weight: 700;
    cursor: pointer; letter-spacing: 2px;
    text-transform: uppercase;
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    transition: all 0.3s ease;
  }
  .start-btn:hover { background: #263238; transform: translateY(-2px); }
  .start-btn:active { transform: scale(0.98); }

  /* ── HUD ── */
  #hud {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    pointer-events: none; padding: 20px;
    display: none; justify-content: space-between;
  }
  #hud.visible { display: flex; }
  .hud-badge {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(10px);
    border-radius: 10px; padding: 10px 15px; 
    color: #37474f; font-weight: 700;
  }

  #status-dot { 
    width: 10px; height: 10px; border-radius: 50%; 
    background: #cfd8dc; display: inline-block; margin-right: 8px; 
  }
  #status-dot.found { background: #f06292; box-shadow: 0 0 10px #f06292; }

  #scan-hint {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    z-index: 10; background: rgba(55, 71, 79, 0.9);
    color: white; padding: 12px 25px; border-radius: 8px; 
    display: none;
  }
  #scan-hint.visible { display: block; }

  .mindar-ui-overlay { display: none !important; }
  video { position: absolute; top: 0; left: 0; z-index: -2 !important; }
</style>
  </head>
  <body>

    <div id="splash">
      <div class="logo-ring"></div>
      <div class="splash-title">HFCC CAMPUS AR</div>
      <button class="start-btn" id="startBtn">Launch AR</button>
    </div>

    <div id="hud">
      <div class="hud-badge"><strong>HFCC Campus</strong></div>
      <div class="hud-badge"><span id="status-dot"></span><span id="status-text">Searching…</span></div>
    </div>

    <div id="scan-hint">📷 Point at Campus Model</div>

    <!-- 2. The Scene -->
    <!-- Note: imageTargetSrc uses a leading / to work with Vite public folder -->
    <a-scene
    mindar-image="imageTargetSrc: /targets/campus.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;"
    color-space="sRGB"
    embedded
    renderer="colorManagement: true, physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <!-- Ensure this path is 100% correct in your public folder -->
      <a-asset-item id="catModel" src="/models/oiiaioooooiai_cat.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <!-- We use 'gltf-model' directly and simplified animation-mixer -->
      <a-entity 
        gltf-model="#catModel" 
        position="0 0 0" 
        scale="0.7 0.7 0.7" 
        animation-mixer>
      </a-entity>
    </a-entity>
  </a-scene>

    <script>
      const splash = document.getElementById('splash');
      const startBtn = document.getElementById('startBtn');
      const hud = document.getElementById('hud');
      const scanHint = document.getElementById('scan-hint');

      startBtn.addEventListener('click', () => {
        splash.classList.add('hidden');
        hud.classList.add('visible');
        scanHint.classList.add('visible');

        // Start MindAR
        const sceneEl = document.querySelector('a-scene');
        const arSystem = sceneEl.systems['mindar-image-system'];
        arSystem.start(); 
      });

      const target = document.querySelector('[mindar-image-target]');
      target.addEventListener('targetFound', () => {
        document.getElementById('status-dot').classList.add('found');
        document.getElementById('status-text').textContent = 'Detected!';
        scanHint.classList.remove('visible');
      });

      target.addEventListener('targetLost', () => {
        document.getElementById('status-dot').classList.remove('found');
        document.getElementById('status-text').textContent = 'Searching…';
        scanHint.classList.add('visible');
      });
    </script>
  </body>
</html>
